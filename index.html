<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Portal</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-50 flex items-center justify-center h-screen">
    <div id="auth-container"
      class="bg-white p-8 rounded-lg shadow-md w-96 relative overflow-hidden"
    >
      <div id="login-form" class="block transition-all duration-300">
        <h2 class="text-2xl font-bold text-slate-900 mb-6">Welcome Back</h2>

        <form id="login-auth-form" class="flex flex-col gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1"
              >Email</label
            >
            <input
              type="email"
              id="login-email"
              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="you@example.com"
              required
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="login-password"
              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="••••••••"
              required
            />
          </div>
          <button
            type="submit"
            class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 transition-colors mt-2"
          >
            Sign In
          </button>
        </form>

        <button
          id="show-register"
          class="mt-6 text-blue-600 text-sm hover:underline w-full text-center"
        >
          Need an account? Register
        </button>
      </div>

      <div id="register-form" class="hidden transition-all duration-300">
        <h2 class="text-2xl font-bold text-slate-900 mb-6">Create Account</h2>

        <form id="reg-form" class="flex flex-col gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1"
              >Username</label
            >
            <input
              type="text"
              id="reg-username"
              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="johndoe"
              required
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1"
              >Email</label
            >
            <input
              type="email"
              id="reg-email"
              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="you@example.com"
              required
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="reg-password"
              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="••••••••"
              required
            />
          </div>
          <button
            type="submit"
            class="w-full bg-slate-900 text-white font-semibold py-2 rounded-md hover:bg-slate-800 transition-colors mt-2"
          >
            Sign Up
          </button>
        </form>

        <button
          id="show-login"
          class="mt-6 text-blue-600 text-sm hover:underline w-full text-center"
        >
          Already have an account? Login
        </button>
      </div>
    </div>
    <div
      id="dashboard"
      class="hidden bg-white p-8 rounded-lg shadow-md w-96 text-center"
    >
      <h1 class="text-3xl font-bold text-slate-900 mb-2">You made it!</h1>
      <p class="text-slate-500 mb-6">This is secure data inside your app.</p>
      <button
        id="logout-btn"
        class="text-red-500 font-semibold hover:underline"
      >
        Log Out
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
